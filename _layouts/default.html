<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% feed_meta %}
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/gymgeek.css' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EMS5WHW7F7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-EMS5WHW7F7');
  </script>
</head>
<body>

  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" class="site-logo">GymGeek</a>
    <div class="nav-links">
      <a href="{{ '/workouts/' | relative_url }}">Workouts & Training</a>
      <a href="{{ '/nutrition/' | relative_url }}">Nutrition</a>
      <a href="{{ '/gear/' | relative_url }}">Gear</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/tools/' | relative_url }}">Tools</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ 'now' | date: "%Y" }} GymGeek. Built in South Africa.</span>
    <span>Affiliate disclosure</span>
  </footer>

</body>
</html>
