---
layout: default
---

<div class="post-header">
  <div class="post-eyebrow">{{ page.categories[0] }}</div>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%B %d, %Y" }} &middot; {{ page.author | default: "GymGeek" }}</div>
</div>

<div class="post-content">
  {{ content }}
</div>
