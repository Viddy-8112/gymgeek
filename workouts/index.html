---
layout: default
title: Workouts
---

<div class="hero">
  <div class="hero-eyebrow">Training</div>
  <h1 class="hero-headline">Work<br><em>outs.</em></h1>
  <p class="hero-sub">Programmes and plans for every level — from first-timer to seasoned lifter.</p>
</div>

<div class="slash-divider"></div>

<div class="section">
  <div class="section-label">All workout articles</div>
  <div class="cards">
    {% for post in site.categories.Workouts %}
    <a href="{{ post.url }}" class="card">
      <span class="card-slash"></span>
      <div class="card-tag">{{ post.categories[0] }}</div>
      <div class="card-title">{{ post.title }}</div>
      <div class="card-meta">{{ post.date | date: "%b %d, %Y" }}</div>
    </a>
    {% endfor %}
  </div>
</div>
